<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مصطلحات الماركتينج</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #111118;
    --border: #1e1e2e;
    --accent: #ff6b35;
    --accent2: #00d4aa;
    --accent3: #7c3aed;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --highlight: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 3rem 0 2rem;
    position: relative;
  }

  .header-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 0.3rem 1rem;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }

  /* Search */
  .search-wrap {
    margin: 2.5rem 0;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .search-box {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* Category filters */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Stats */
  .stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.6s;
  }

  .stat {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .stat span { color: var(--accent2); }

  /* Cards grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color, var(--accent)), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover { 
    border-color: var(--accent-color, var(--accent)); 
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.8rem;
    gap: 1rem;
  }

  .term-en {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent-color, var(--accent));
    letter-spacing: 0.5px;
  }

  .term-ar {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .pronunciation {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.8rem;
    font-style: italic;
  }

  .definition {
    font-size: 0.88rem;
    color: #b0b0c8;
    line-height: 1.7;
    font-weight: 300;
  }

  .category-badge {
    font-size: 0.68rem;
    padding: 0.25rem 0.7rem;
    border-radius: 50px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .example {
    margin-top: 0.9rem;
    padding: 0.7rem;
    background: var(--highlight);
    border-radius: 8px;
    border-right: 2px solid var(--accent-color, var(--accent));
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
    display: none;
  }

  .card.expanded .example { display: block; }
  .card.expanded { border-color: var(--accent-color, var(--accent)); }

  .expand-hint {
    margin-top: 0.7rem;
    font-size: 0.72rem;
    color: var(--muted);
    opacity: 0.5;
    font-family: 'Space Mono', monospace;
  }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    display: none;
  }

  /* Category colors */
  .cat-strategy { --accent-color: #ff6b35; }
  .cat-content { --accent-color: #00d4aa; }
  .cat-data { --accent-color: #7c3aed; }
  .cat-social { --accent-color: #f59e0b; }
  .cat-sales { --accent-color: #ec4899; }
  .cat-brand { --accent-color: #3b82f6; }

  .badge-strategy { background: rgba(255,107,53,0.15); color: #ff6b35; }
  .badge-content { background: rgba(0,212,170,0.15); color: #00d4aa; }
  .badge-data { background: rgba(124,58,237,0.15); color: #a78bfa; }
  .badge-social { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-sales { background: rgba(236,72,153,0.15); color: #ec4899; }
  .badge-brand { background: rgba(59,130,246,0.15); color: #60a5fa; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .count-display {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  footer {
    text-align: center;
    padding: 3rem 0 2rem;
    color: var(--muted);
    font-size: 0.8rem;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-tag">Marketing Glossary • دليل المصطلحات</div>
    <h1>مصطلحات <span>الماركتينج</span></h1>
    <p class="subtitle">كل المصطلحات اللي هتسمعها في الشركات — بالعربي والإنجليزي</p>
  </header>

  <div class="search-wrap">
    <input type="text" class="search-box" placeholder="🔍  ابحث عن مصطلح... (عربي أو إنجليزي)" id="searchInput" oninput="filterCards()">
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">الكل</button>
    <button class="filter-btn" onclick="setFilter('strategy', this)">🎯 استراتيجية</button>
    <button class="filter-btn" onclick="setFilter('content', this)">✍️ كونتنت</button>
    <button class="filter-btn" onclick="setFilter('data', this)">📊 داتا وتحليل</button>
    <button class="filter-btn" onclick="setFilter('social', this)">📱 سوشيال ميديا</button>
    <button class="filter-btn" onclick="setFilter('sales', this)">💰 مبيعات</button>
    <button class="filter-btn" onclick="setFilter('brand', this)">🏷️ براند</button>
  </div>

  <div class="count-display" id="countDisplay"></div>

  <div class="grid" id="cardsGrid"></div>
  <div class="no-results" id="noResults">🔍 مفيش نتايج للبحث ده</div>

  <footer>اضغط على أي كارد عشان تشوف مثال عملي</footer>
</div>

<script>
const terms = [
  // Strategy
  { en: "Assets", ar: "الأصول / المواد التسويقية", cat: "content", pron: "أساتس",
    def: "أي محتوى أو مادة تسويقية عندك زي الصور، الفيديوهات، الـ templates، الـ logos. لما حد يقول 'شيرني الأساتس' — يعني ابعتلي الملفات والمواد دي.",
    ex: "مثال: 'محتاجين نحدّث الـ brand assets قبل اللانش — الـ logo والألوان والـ fonts'" },

  { en: "Case Study", ar: "دراسة حالة", cat: "content", pron: "كيس ستادي",
    def: "قصة نجاح مكتوبة بتحكي إزاي خدمتك أو منتجك ساعد عميل معين يحل مشكلة ووصل لنتيجة. أقوى أداة لإقناع العملاء الجدد.",
    ex: "مثال: 'عملنا كيس ستادي لـ شركة X — كانوا بيخسروا leads وبعد شغلنا معاهم زاد الـ conversion بـ 40%'" },

  { en: "Funnel", ar: "قمع المبيعات / الفانل", cat: "strategy", pron: "فانل",
    def: "رحلة العميل من أول ما يسمع عنك لحد ما يشتري. Top of funnel (TOFU) = وعي، Middle (MOFU) = اهتمام، Bottom (BOFU) = شراء.",
    ex: "مثال: 'الـ content ده for top of funnel — مش هيبيع مباشرة بس هيعرّف الناس علينا'" },

  { en: "Go-to-Market (GTM)", ar: "استراتيجية الدخول للسوق", cat: "strategy", pron: "جي تي إم",
    def: "الخطة الكاملة لإزاي هتطلق منتج أو خدمة في السوق — مين الـ target، إيه الـ channels، إيه الـ message.",
    ex: "مثال: 'اجتماع بكرة هنناقش الـ GTM strategy للمنتج الجديد'" },

  { en: "Positioning", ar: "تحديد المكانة في السوق", cat: "brand", pron: "بوزيشننج",
    def: "إزاي بتعرّف نفسك في السوق مقارنة بالمنافسين. إيه اللي بيخليك مختلف وليه العميل يختارك.",
    ex: "مثال: 'لازم نراجع الـ positioning بتاعنا — الرسالة مش واضحة بما يكفي'" },

  { en: "Target Audience", ar: "الجمهور المستهدف", cat: "strategy", pron: "تارجيت أوديانس",
    def: "الفئة المحددة من الناس اللي بتتكلم معاهم في تسويقك. محددين بالعمر، الاهتمامات، المشاكل، السلوك.",
    ex: "مثال: 'الـ target audience بتاعنا هو الـ decision makers في الشركات المتوسطة'" },

  { en: "Persona / Buyer Persona", ar: "شخصية العميل المثالي", cat: "strategy", pron: "بيرسونا",
    def: "ملف وهمي بيمثل عميلك المثالي — اسمه، مشاكله، اهتماماته، إزاي بيفكر. بيساعد في كتابة محتوى يلمسه.",
    ex: "مثال: 'كتبنا الـ email campaign دي على أساس الـ persona بتاعت الـ marketing manager'" },

  { en: "Value Proposition", ar: "القيمة المقدمة / مقترح القيمة", cat: "strategy", pron: "فاليو بروبوزيشن",
    def: "إيه اللي بتقدمه للعميل وليه يختارك — الفايدة الحقيقية من منتجك أو خدمتك بشكل مختصر ومؤثر.",
    ex: "مثال: 'لازم نقوّي الـ value proposition في الـ landing page — العميل مش فاهم مين هو المنتج ده'" },

  { en: "USP – Unique Selling Point", ar: "نقطة التميز الفريدة", cat: "brand", pron: "يو إس بي",
    def: "الحاجة الواحدة اللي بتميزك عن كل المنافسين — السبب الأقوى للشراء منك.",
    ex: "مثال: 'الـ USP بتاعنا هو الـ delivery في 24 ساعة — ده اللي محدش غيرنا بيعمله'" },

  // Content
  { en: "Content Strategy", ar: "استراتيجية المحتوى", cat: "content", pron: "كونتنت ستراتيجي",
    def: "الخطة الشاملة للمحتوى — إيه هتنشر، لمين، إمتى، وعلى إيه channel، وإيه الهدف منه.",
    ex: "مثال: 'محتاجين نبني content strategy لـ 3 شهور قبل ما نبدأ ننشر عشوائي'" },

  { en: "Copywriting", ar: "كتابة النصوص التسويقية", cat: "content", pron: "كوبي رايتنج",
    def: "كتابة نصوص بهدف الإقناع والبيع — إعلانات، emails، landing pages، أو حتى posts على السوشيال.",
    ex: "مثال: 'الـ copy بتاع الإعلان ده ضعيف — محتاجين نشتغل على الـ headline'" },

  { en: "Content Calendar", ar: "خطة النشر / تقويم المحتوى", cat: "content", pron: "كونتنت كالندر",
    def: "جدول منظم بيوضح كل المحتوى المخطط نشره — الموضوع، التاريخ، الـ platform، المسؤول.",
    ex: "مثال: 'عندنا content calendar للشهر الجاي جاهز — بس محتاجين نضيف موضوع اللانش'" },

  { en: "CTA – Call to Action", ar: "دعوة للتصرف", cat: "content", pron: "سي تي إيه",
    def: "الجملة أو الزرار اللي بيطلب من العميل يعمل حاجة — 'اشتري دلوقتي'، 'سجّل مجاناً'، 'تواصل معنا'.",
    ex: "مثال: 'الـ post ده مفيهوش CTA واضح — الناس مش عارفة تعمل إيه بعدين'" },

  { en: "Thought Leadership", ar: "قيادة الرأي / ريادة الفكر", cat: "content", pron: "ثوت ليدرشيب",
    def: "محتوى بيثبت إنك خبير في مجالك — مقالات، آراء، insights. بيبني ثقة وسمعة على المدى الطويل.",
    ex: "مثال: 'الـ LinkedIn posts بتاعت الـ CEO هي thought leadership content'" },

  { en: "Whitepaper", ar: "ورقة بيضاء / تقرير متعمق", cat: "content", pron: "وايت بيبر",
    def: "تقرير طويل ومفصل عن موضوع معين — بيثبت خبرتك ومفيد جداً في الـ B2B لجذب العملاء المحتملين.",
    ex: "مثال: 'عملنا whitepaper عن trens الـ industry وبيتحمّل 300 مرة في الشهر'" },

  // Data & Analytics
  { en: "KPI – Key Performance Indicator", ar: "مؤشر الأداء الرئيسي", cat: "data", pron: "كي بي آي",
    def: "الأرقام اللي بتقيس بيها نجاح شغلك — زي عدد الـ leads، نسبة الـ conversion، تكلفة الإعلان.",
    ex: "مثال: 'الـ KPIs بتاعت الكوارتر ده: 500 lead و 15% conversion rate'" },

  { en: "ROI – Return on Investment", ar: "العائد على الاستثمار", cat: "data", pron: "آر أو آي",
    def: "الفرق بين اللي كسبته ولي صرفته. بتعرف بيه إذا كان الحملة التسويقية كانت تستاهل ولا لا.",
    ex: "مثال: 'الـ campaign دي ROI بتاعها 300% — يعني على كل 100 جنيه صرفناهم، رجعنا بـ 400'" },

  { en: "Conversion Rate", ar: "معدل التحويل", cat: "data", pron: "كونفيرشن ريت",
    def: "نسبة الناس اللي عملوا الحاجة اللي عايزها من إجمالي اللي شافوا الإعلان أو الصفحة.",
    ex: "مثال: 'الـ landing page conversion rate بتاعنا 3% — الـ industry average هو 5%، محتاجين نحسّن'" },

  { en: "Impressions", ar: "مرات الظهور", cat: "data", pron: "إمبريشنز",
    def: "عدد المرات اللي ظهر فيها الإعلان أو المنشور — مش بالضرورة إن حد ضغط عليه.",
    ex: "مثال: 'الإعلان عنده مليون impression بس الـ click-through rate منخفض'" },

  { en: "CTR – Click-Through Rate", ar: "معدل النقر", cat: "data", pron: "سي تي آر",
    def: "نسبة الناس اللي ضغطوا على الإعلان أو الـ post من إجمالي اللي شافوه.",
    ex: "مثال: 'الـ CTR بتاعنا 2% — يعني من كل 100 شخص شاف الإعلان، 2 ضغطوا'" },

  { en: "Benchmark", ar: "معيار المقارنة", cat: "data", pron: "بينشمارك",
    def: "الرقم أو المستوى اللي بتقيس عليه أداءك — إما من تاريخك أنت أو من المتوسط في السوق.",
    ex: "مثال: 'الـ benchmark بتاع الـ open rate في الـ email marketing في مجالنا هو 22%'" },

  { en: "Analytics", ar: "التحليلات / إحصاءات الأداء", cat: "data", pron: "أنالتيكس",
    def: "البيانات والأرقام اللي بتحلل بيها أداء شغلك — من Google Analytics أو Meta Insights أو غيرها.",
    ex: "مثال: 'شوف الـ analytics وقولي إيه الـ pages اللي عندها أعلى bounce rate'" },

  { en: "A/B Testing", ar: "اختبار أ/ب", cat: "data", pron: "إيه بي تيستنج",
    def: "تجرب نسختين من نفس الحاجة (إعلان، email، صفحة) وبتشوف أيهما بتؤدي أحسن.",
    ex: "مثال: 'عملنا A/B test على الـ subject line — النسخة B كان الـ open rate بتاعها أعلى بـ 18%'" },

  // Social Media
  { en: "Engagement", ar: "التفاعل", cat: "social", pron: "إنجيجمنت",
    def: "كل تفاعل على منشوراتك — likes، comments، shares، saves. بيقيس مدى اهتمام جمهورك بمحتواك.",
    ex: "مثال: 'الـ engagement rate بتاعنا على LinkedIn أحسن من Instagram'" },

  { en: "Reach", ar: "مدى الانتشار / عدد من وصلت ليهم", cat: "social", pron: "ريتش",
    def: "عدد الأشخاص الفريدين اللي شافوا محتواك — غير الـ impressions اللي بتحسب التكرار.",
    ex: "مثال: 'الـ post ده وصل لـ 50,000 reach بس الـ impressions 80,000 — يعني ناس كتير شافته أكتر من مرة'" },

  { en: "Organic vs Paid", ar: "عضوي مقابل مدفوع", cat: "social", pron: "أورجانيك / بيد",
    def: "Organic = المحتوى اللي بينشر بدون فلوس ويوصل بشكل طبيعي. Paid = إعلانات مدفوعة.",
    ex: "مثال: 'الـ organic reach بقى أقل — لازم نخصص budget للـ paid content'" },

  { en: "Influencer Marketing", ar: "تسويق المؤثرين", cat: "social", pron: "إنفلوانسر ماركتينج",
    def: "التعاون مع أشخاص عندهم جمهور كبير على السوشيال ميديا عشان يروّجوا لمنتجك.",
    ex: "مثال: 'عملنا collab مع micro-influencers في المجال — نتيجتهم أحسن من الـ mega influencers'" },

  { en: "Hashtag Strategy", ar: "استراتيجية الهاشتاق", cat: "social", pron: "هاشتاق ستراتيجي",
    def: "اختيار الـ hashtags الصح لتوسيع انتشار منشوراتك والوصول لجمهور أكبر.",
    ex: "مثال: 'لازم نعمل hashtag research — مش هنستخدم نفس الـ hashtags في كل post'" },

let activeFilter = 'all';

function buildCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  
  let filtered = terms.filter(t => {
    const matchFilter = activeFilter === 'all' || t.cat === activeFilter;
    const matchSearch = !query || 
      t.en.toLowerCase().includes(query) || 
      t.ar.includes(query) || 
      t.pron.includes(query) ||
      t.def.includes(query);
    return matchFilter && matchSearch;
  });

  document.getElementById('countDisplay').textContent = `${filtered.length} مصطلح`;

  if (filtered.length === 0) {
    document.getElementById('noResults').style.display = 'block';
    return;
  }
  document.getElementById('noResults').style.display = 'none';

  const catLabels = { strategy: '🎯 استراتيجية', content: '✍️ كونتنت', data: '📊 داتا', social: '📱 سوشيال', sales: '💰 مبيعات', brand: '🏷️ براند' };

  filtered.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = `card cat-${t.cat}`;
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="term-en">${t.en}</div>
          <div class="term-ar">${t.ar}</div>
          <div class="pronunciation">/ ${t.pron} /</div>
        </div>
        <span class="category-badge badge-${t.cat}">${catLabels[t.cat]}</span>
      </div>
      <div class="definition">${t.def}</div>
      <div class="example">💬 ${t.ex}</div>
      <div class="expand-hint">← اضغط للمثال</div>
    `;
    card.addEventListener('click', () => {
      const wasExpanded = card.classList.contains('expanded');
      document.querySelectorAll('.card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!wasExpanded) card.classList.add('expanded');
    });
    grid.appendChild(card);
  });
}

function filterCards() { buildCards(); }

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCards();
}

buildCards();
