function showErr(m){
  document.getElementById('_ls').style.display='none';

// ── Resolve username ──
async function resolveUser(u){
  try{
    var r=await supa.from('studio_data').select('user_id').ilike('username_index',u).maybeSingle();
    if(r.data&&r.data.user_id)return r.data.user_id;
    var r2=await supa.from('studio_data').select('user_id,data').like('data::text','%"username":"'+u+'"%').limit(5);
    for(var i=0;i<(r2.data||[]).length;i++){
      try{var d=typeof r2.data[i].data==='string'?JSON.parse(r2.data[i].data):r2.data[i].data;
        if(d&&d.settings&&d.settings.username&&d.settings.username.toLowerCase()===u.toLowerCase())return r2.data[i].user_id;
      }catch(e){}
    }
  }catch(e){}
  return null;
}

// ── BOOT ──
async function boot(){
  var uid=_pUid;
  if(!uid&&_pUname){uid=await resolveUser(_pUname);}
  if(!uid){showErr('رابط غير صحيح — يجب أن يحتوي على uid أو اسم مستخدم');return;}
  await buildPage(uid);
}

      (p.items&&p.items.length?'<div class="_pkg-items">'+p.items.slice(0,3).map(function(it){return '<div class="_pkg-item"><span><i class="fa-solid fa-check"></i></span>'+xe(it)+'</div>';}).join('')+'</div>':'')+

// ── SVC DETAIL PAGE ──
window._openSvcPage=function(idx){
  var svcs=window._pubServices||[]; var svc=svcs[idx]; if(!svc) return;
  var accent=window._pubAccent; var C=window._pubColors; var ud=window._pubUd;
  var pr=svc.price&&+svc.price?Number(svc.price).toLocaleString()+' '+(svc.currency||'ج.م'):'عند الطلب';
  var imgSrc=svc.image||svc.img||'';
  var termsHtml='';
  if(svc.terms&&svc.terms.length){
    termsHtml='<div class="_dtl-section"><div class="_dtl-section-title"><i class="fa-solid fa-list-check"></i> ماذا تحصل عليه</div>'+
      svc.terms.map(function(t){return '<div class="_dtl-item"><span class="_dtl-item-dot"><i class="fa-solid fa-check"></i></span><span>'+xe(t)+'</span></div>';}).join('')+'</div>';
  }
  var metaHtml='';
  if(svc.delivery||svc.revisions){
    metaHtml='<div class="_dtl-chips">'+
      (svc.delivery?'<div class="_dtl-chip"><i class="fa-solid fa-clock"></i> '+xe(svc.delivery)+'</div>':'')+
      (svc.revisions?'<div class="_dtl-chip"><i class="fa-solid fa-rotate"></i> '+svc.revisions+' تعديل</div>':'')+
    '</div>';
  }

    if(relPf.length){
      portHtml='<div class="_dtl-section"><div class="_dtl-section-title"><i class="fa-solid fa-image"></i> أعمال مشابهة</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+
        relPf.map(function(p){var img=p.image||p.thumb||'';var link=p.link||p.url||'#';return '<a class="_pf-card" href="'+xe(link)+'" target="_blank">'+(img?'<img src="'+xe(img)+'" alt="" loading="lazy">':'<div class="_pf-card-ph"><i class="fa-solid fa-folder" style="font-size:22px"></i></div>')+'</a>';}).join('')+
        '</div></div>';
    }
  }
  var ex=document.getElementById('_svc-dtl'); if(ex) ex.remove();
  var pg=document.createElement('div'); pg.id='_svc-dtl'; pg.className='_dtl-page';
  pg.innerHTML='<div class="_dtl-inner">'+
    '<button class="_dtl-back" onclick="document.getElementById(\'_svc-dtl\').remove();document.body.style.overflow=\'\'"><i class="fa-solid fa-arrow-right"></i> رجوع</button>'+
    (imgSrc?'<div class="_dtl-hero"><img src="'+xe(imgSrc)+'"></div>':'<div class="_dtl-hero-ph">'+(svc.icon||'<i class="fa-solid fa-bag-shopping"></i>')+'</div>')+
    (svc.cat?'<div style="font-size:11px;font-weight:700;color:'+accent+';margin-bottom:6px;text-transform:uppercase">'+xe(svc.cat)+'</div>':'')+
    '<div class="_dtl-title">'+xe(svc.name)+'</div>'+
    '<div class="_dtl-price">'+pr+'</div>'+
    (svc.desc?'<div class="_dtl-desc">'+xe(svc.desc)+'</div>':'')+
    metaHtml+termsHtml+portHtml+
    '<div class="_dtl-cta">'+
      (svc.payment_link?'<a href="'+xe(svc.payment_link)+'" target="_blank" class="_dtl-cta-btn pay"><i class="fa-solid fa-credit-card"></i> ادفع الآن</a>':'')+
      '<button class="_dtl-cta-btn" onclick="_openOrd(\''+encodeURIComponent(svc.name)+'\',\'\','+(svc.price||0)+',\''+encodeURIComponent(svc.payment_link||'')+'\')"><i class="fa-solid fa-paper-plane"></i> اطلب الآن</button>'+
    '</div>'+
  '</div>';
  document.body.appendChild(pg); document.body.style.overflow='hidden'; pg.scrollTop=0;
};

// ── ORDER MODAL ──
window._openOrd=function(sn,pn,price,pl){
  var decodedSvc=sn?decodeURIComponent(sn):'';
  var decodedPkg=pn?decodeURIComponent(pn):'';
  var decodedPay=pl?decodeURIComponent(pl):'';
  var itemName=decodedSvc||decodedPkg||'';
  var accent=window._pubAccent||'#7c6ff7';
  var C=window._pubColors||{};
  var phone=(window._pubSettings&&window._pubSettings.phone)||'';
  var studio=(window._pubSettings&&window._pubSettings.name)||'Studio';
  var userId=window._pubUserId||'';
  var ex=document.getElementById('_ord-ov'); if(ex) ex.remove();
  var ov=document.createElement('div'); ov.id='_ord-ov'; ov.className='_ord-ov';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  ov.innerHTML='<div class="_ord-sheet">'+
    '<div class="_ord-handle"></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'+
      '<div style="font-size:18px;font-weight:900;color:'+(C.textMain||'#f0f0f5')+'"><i class="fa-solid fa-paper-plane" style="color:'+accent+'"></i> '+(itemName?'طلب: '+xe(itemName):'تواصل معنا')+'</div>'+
      '<button onclick="document.getElementById(\'_ord-ov\').remove()" style="background:none;border:1px solid '+(C.borderC||'rgba(255,255,255,.08)')+';width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;color:'+(C.textMain||'#f0f0f5')+'"><i class="fa-solid fa-xmark"></i></button>'+
    '</div>'+
    '<div style="font-size:12px;color:'+(C.textMuted||'#777799')+';margin-bottom:18px">سيتم التواصل معك في أقرب وقت</div>'+
    (decodedPay?'<a href="'+xe(decodedPay)+'" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#4fd1a5,#38b28a);color:#fff;text-decoration:none;padding:13px;border-radius:12px;font-family:Cairo,sans-serif;font-size:14px;font-weight:800;margin-bottom:14px"><i class="fa-solid fa-credit-card"></i> ادفع مباشرة '+(price&&+price?'('+Number(price).toLocaleString()+' ج.م)':'')+'</a>':'')+
    '<div id="_ord-form">'+
      '<input id="_ord-nm" class="_ord-input" placeholder="الاسم الكامل *" type="text">'+
      '<input id="_ord-ph" class="_ord-input" placeholder="رقم الواتساب *" type="tel">'+
      '<input id="_ord-em" class="_ord-input" placeholder="البريد الإلكتروني (اختياري)" type="email" dir="ltr">'+
      '<input id="_ord-sv" class="_ord-input" value="'+xe(itemName)+'" placeholder="الخدمة المطلوبة">'+
      '<textarea id="_ord-ds" class="_ord-input" placeholder="تفاصيل وملاحظات..."></textarea>'+
      '<button class="_ord-submit" onclick="_submitOrd(\''+encodeURIComponent(userId)+'\',\''+encodeURIComponent(decodedSvc)+'\',\''+encodeURIComponent(decodedPkg)+'\','+(price||0)+',\''+encodeURIComponent(decodedPay)+'\')"><i class="fa-solid fa-paper-plane"></i> إرسال الطلب</button>'+
    '</div>'+
    '<div id="_ord-succ" style="display:none;text-align:center;padding:20px 0">'+
      '<div style="font-size:48px;margin-bottom:10px">🎉</div>'+
      '<div style="font-size:17px;font-weight:800;margin-bottom:5px;color:'+(C.textMain||'#f0f0f5')+'">تم إرسال طلبك!</div>'+
      '<div style="font-size:12px;color:'+(C.textMuted||'#777799')+';margin-bottom:18px">سنتواصل معك قريباً</div>'+
      '<a href="'+PORTAL_URL+'?uid='+encodeURIComponent(userId)+'" style="display:inline-flex;align-items:center;gap:8px;background:'+accent+'18;border:1.5px solid '+accent+'44;color:'+accent+';border-radius:11px;padding:11px 18px;font-family:Cairo,sans-serif;font-size:13px;font-weight:700;text-decoration:none"><i class="fa-solid fa-folder-open"></i> تابع طلبك من بورتال العميل</a>'+
    '</div>'+
  '</div>';
  document.body.appendChild(ov);
};

window._submitOrd=function(uidEnc,snEnc,pnEnc,price,plEnc){
  var uid=decodeURIComponent(uidEnc),sn=decodeURIComponent(snEnc),pn=decodeURIComponent(pnEnc),pl=decodeURIComponent(plEnc);
  var nm=(document.getElementById('_ord-nm')||{}).value||'';
  var ph=(document.getElementById('_ord-ph')||{}).value||'';
  var em=(document.getElementById('_ord-em')||{}).value||'';
  var sv=(document.getElementById('_ord-sv')||{}).value||sn||pn||'';
  var ds=(document.getElementById('_ord-ds')||{}).value||'';
  if(!nm.trim()||!ph.trim()){
    var eb=document.querySelector('#_ord-form ._ord-input');
    if(eb)eb.style.borderColor='#f76f7c';
    return;
  }
  var btn=document.querySelector('._ord-submit'); if(btn){btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';}
  var order={id:Date.now()+'_o',type:'svc_order',client_name:nm,client_phone:ph,client_email:em,service_name:sn||pn||sv||'خدمة',pkg_name:pn||'',price:+price||0,desc:ds,status:'pending',created_at:new Date().toISOString(),read:false};
  var studioPhone=(window._pubSettings&&window._pubSettings.phone)||'';
  var studioName=(window._pubSettings&&window._pubSettings.name)||'Studio';
  supa.from('studio_data').select('data').eq('user_id',uid).maybeSingle().then(function(res){
    if(res.data){
      var ud2=null;try{ud2=typeof res.data.data==='string'?JSON.parse(res.data.data):res.data.data;}catch(e){}
      if(ud2){
        ud2.svc_orders=ud2.svc_orders||[]; ud2.svc_orders.push(order);
        ud2._pending_notifications=ud2._pending_notifications||[];
        ud2._pending_notifications.push({id:order.id+'_n',title:'طلب جديد!',body:nm+' — '+(sn||pn||sv),type:'svc_order',created_at:new Date().toISOString(),read:false});
        return supa.from('studio_data').update({data:JSON.stringify(ud2),updated_at:new Date().toISOString()}).eq('user_id',uid);
      }
    }
  }).then(function(){
    document.getElementById('_ord-form').style.display='none';
    document.getElementById('_ord-succ').style.display='block';
    // WhatsApp notification
    if(studioPhone){
      var txt='مرحباً '+studioName+' 👋\nطلب جديد من: '+nm+'\nالخدمة: '+(sn||pn||sv)+'\nالهاتف: '+ph+(ds?'\nملاحظات: '+ds:'');
      setTimeout(function(){window.open('https://wa.me/'+studioPhone.replace(/\D/g,'')+'?text='+encodeURIComponent(txt),'_blank');},600);
    }
  }).catch(function(e){if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> إرسال الطلب';}});
};

document.addEventListener('DOMContentLoaded',boot);
